<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBX PANEL | Dashboard</title>
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --card-bg: #141417;
            --neon-purple: #8a2be2;
            --neon-blue: #00d2ff;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-white);
            margin: 0;
            overflow-x: hidden;
        }

        /* Navbar Style */
        header {
            background: var(--card-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            color: var(--neon-purple);
            margin-right: 20px;
        }

        /* Sidebar Navigation Interface */
        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: #0f0f12;
            overflow-x: hidden;
            transition: 0.4s;
            padding-top: 20px;
            border-right: 1px solid var(--neon-purple);
        }

        .sidenav h2 {
            color: var(--neon-purple);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .sidenav a {
            padding: 12px 25px;
            text-decoration: none;
            font-size: 1.1rem;
            color: #bbb;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover {
            color: var(--neon-blue);
            background: rgba(138, 43, 226, 0.1);
        }

        .section-heading {
            padding: 20px 25px 5px;
            font-size: 0.85rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .closebtn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
        }

        /* Content Area */
        .container { padding: 20px; text-align: center; }

        .product-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .buy-btn {
            background: linear-gradient(to right, #4a00e0, #8e2de2);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <span class="closebtn" onclick="closeNav()">&times;</span>
    <h2>PBX PANEL</h2>
    
    <a href="#dashboard" onclick="closeNav()">🏠 Dashboard</a>
    <a href="#deposit" onclick="closeNav()">💰 Deposit</a>
    <a href="#buy-key" onclick="closeNav()">🔑 Buy Key</a>
    <a href="#my-key" onclick="closeNav()">📂 My Key</a>
    <a href="#all-history" onclick="closeNav()">📜 All History</a>

    <div class="section-heading">Account Setting</div>
    <a href="#profile" onclick="closeNav()">👤 My Profile</a>
    <a href="#logout" onclick="closeNav()" style="color: #ff4136;">🚪 Logout</a>
</div>

<header>
    <div class="menu-btn" onclick="openNav()">☰</div>
    <div style="font-weight: bold; font-size: 1.2rem;">PBX PANEL STORE</div>
</header>

<div class="container">
    <h3 style="color: var(--neon-blue);">Welcome to Dashboard</h3>
    <p style="font-size: 0.9rem; color: #888;">Niche se koi bhi panel buy karein</p>

    <div class="product-card">
        <div class="product-info"><h3>BRO MOD (Root)</h3><p>₹100</p></div>
        <a href="https://wa.me/918557916807" class="buy-btn">BUY</a>
    </div>
    
    </div>

<script>
function openNav() {
  document.getElementById("mySidenav").style.width = "280px";
}

function closeNav() {
  document.getElementById("mySidenav").style.width = "0";
}
</script>

</body>
</html>
